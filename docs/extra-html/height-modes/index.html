<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Buckaroo — Height Modes</title>
<!-- AG Grid + Buckaroo styles (bundled with height-modes.js) -->
<link rel="stylesheet" href="height-modes.css">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  #root { width: 100%; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="height-modes.js"></script>
</body>
</html>
