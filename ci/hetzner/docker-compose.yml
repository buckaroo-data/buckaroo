services:
  ci:
    image: buckaroo-ci
    container_name: buckaroo-ci
    volumes:
      # Source code + pnpm store — both on host tmpfs (/opt/ci/ramdisk) so all
      # I/O is in RAM and pnpm can hardlink (same filesystem). Set up by
      # cloud-init / manual: mount -t tmpfs -o size=10G tmpfs /opt/ci/ramdisk
      - /opt/ci/ramdisk/repo:/repo
      - /opt/ci/ramdisk/pnpm-store:/opt/pnpm-store
      # CI runner scripts — bind-mounted so script changes take effect instantly
      # without rebuilding the Docker image. Only Dockerfile changes (new deps,
      # system packages) require a rebuild. Overrides the baked-in /opt/ci-runner/.
      # Uses /opt/ci/runner/ (separate from /opt/ci/repo/) so git checkout of
      # arbitrary SHAs inside /repo doesn't swap out the runner mid-run.
      # Update with: ci/hetzner/update-runner.sh
      - /opt/ci/runner:/opt/ci-runner:ro
      # CI logs — shared with host so webhook.py can serve them at /logs/<sha>.
      - /opt/ci/logs:/opt/ci/logs
      # JS build cache — persists across container restarts.
      - /opt/ci/js-cache:/opt/ci/js-cache
      # Playwright browser binaries — named volume so they survive image rebuilds.
      # Initialized from image content on first start, then updated in place.
      - playwright-browsers:/opt/ms-playwright
    environment:
      - CI=true
      - PLAYWRIGHT_BROWSERS_PATH=/opt/ms-playwright
      - PNPM_STORE_DIR=/opt/pnpm-store
    # Warm sidecar: stays alive between CI runs, avoiding ~500ms docker run overhead.
    # tini as PID 1 (ENTRYPOINT in Dockerfile) reaps zombies from docker exec'd CI runs.
    shm_size: '2g'
    command: sleep infinity
    restart: unless-stopped

volumes:
  playwright-browsers:
